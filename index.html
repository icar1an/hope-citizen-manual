<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#e9e7e8">
  <meta name="description" content="H.O.P.E. — Human Order and Phase Enforcement. Cooperation secures a bright morning.">
  <title>WATCHLIGHT</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔦</text></svg>">

  <link rel="stylesheet" href="/src/style.css">
</head>
<body data-state="day">

  <!-- Globe Background Layer -->
  <div class="globe-container">
    <div class="globe-map">
      <img src="./assets/globe.png" alt="" class="globe-image" draggable="false">
    </div>
    <div class="globe-overlay"></div>
  </div>

  <!-- H.O.P.E. Logo (top-left) -->
  <div class="logo">
    <img src="./assets/logo-light.png" alt="H.O.P.E." class="logo-img logo-light">
    <img src="./assets/logo-dark.png" alt="H.O.P.E." class="logo-img logo-dark">
  </div>

  <!-- Status Info (left side, above countdown) -->
  <div class="status-info">
    <p class="status-line">System Status: Maintained</p>
    <p class="status-line">Atmospheric Obscuration Status: <span id="obscuration">0</span>%</p>
    <p class="status-line">Self Report: <span id="self-report">30</span>% Completed</p>
  </div>

  <!-- Notification Ticker (overlays on globe area) -->
  <div class="notification" id="notification" aria-live="polite">
    <div class="notification-inner">
      <!-- Pixel agent icon -->
      <div class="notification-icon">
        <img src="./assets/agent.svg" alt="" class="agent-icon">
      </div>
      <div class="notification-text" id="notification-text"></div>
    </div>
  </div>

  <!-- Countdown Section (bottom) -->
  <div class="countdown-section">
    <p class="countdown-label" id="countdown-label">NIGHT SIREN LAUNCH IN</p>
    <div class="countdown" id="countdown">00:00:00</div>
    <p class="tagline">cooperation secures a bright morning.</p>
  </div>

  <!-- Warning Alert (only visible during night/siren state) -->
  <div class="alert-banner" id="alert-banner" hidden>
    <span class="alert-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 0L20 18H0L10 0Z" fill="currentColor"/>
        <text x="10" y="15" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">!</text>
      </svg>
    </span>
    <span class="alert-text" id="alert-text">The Lost is present. Do not engage.</span>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
